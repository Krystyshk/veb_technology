<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buy List</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app-wrapper">

  <div class="card">
    <div class="add-row">
      <input type="text" placeholder="Назва товару" />
      <button class="btn btn-add" data-tooltip="Додати товар">Додати</button>
    </div>

    <div class="item-row">
      <span class="item-name bought-name">Помідори</span>
      <span class="qty-display">2</span>
      <button class="btn btn-toggle" data-tooltip="Позначити як куплено">Не куплено</button>
    </div>

    <div class="item-row">
      <span class="item-name">Печиво</span>
      <div class="qty-controls">
        <button class="btn-qty minus" data-tooltip="Зменшити кількість">−</button>
        <span class="qty-display">2</span>
        <button class="btn-qty plus" data-tooltip="Збільшити кількість">+</button>
      </div>
      <button class="btn btn-toggle bought" data-tooltip="Позначити як не куплено">Куплено</button>
      <button class="btn btn-delete" data-tooltip="Видалити товар">✕</button>
    </div>

    <div class="item-row">
      <span class="item-name editing">Сир</span>
      <div class="qty-controls">
        <button class="btn-qty minus disabled" data-tooltip="Зменшити кількість">−</button>
        <span class="qty-display">1</span>
        <button class="btn-qty plus" data-tooltip="Збільшити кількість">+</button>
      </div>
      <button class="btn btn-toggle bought" data-tooltip="Позначити як не куплено">Куплено</button>
      <button class="btn btn-delete" data-tooltip="Видалити товар">✕</button>
    </div>
  </div>

  <div class="card">
    <div class="summary-section">
      <h3>Залишилося</h3>
      <div class="tags">
        <span class="product-item">Печиво <span class="amount">2</span></span>
        <span class="product-item">Сир <span class="amount">1</span></span>
      </div>
    </div>
    <div class="summary-section">
      <h3>Куплено</h3>
      <div class="tags">
        <span class="product-item bought-tag">Помідори <span class="amount">2</span></span>
      </div>
    </div>
  </div>

</div>

<div class="badge">
  <div class="badge-title">Buy List</div>
  <div class="badge-author">Created by:<br><strong>Кристина Попкова</strong></div>
</div>

</body>
</html>
