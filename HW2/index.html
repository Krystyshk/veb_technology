<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buy List</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app-wrapper">

  <div class="card">
    <div class="add-row">
      <input type="text" id="new-item-input" placeholder="Назва товару" />
      <button class="btn btn-add" id="add-btn" data-tooltip="Додати товар">Додати</button>
    </div>
    <div id="item-list"></div>
  </div>

  <div class="card">
    <div class="summary-section">
      <h3>Залишилося</h3>
      <div class="tags" id="remaining-tags"></div>
    </div>
    <div class="summary-section">
      <h3>Куплено</h3>
      <div class="tags" id="bought-tags"></div>
    </div>
  </div>

</div>

<div class="badge">
  <div class="badge-title">Buy List</div>
  <div class="badge-author">Created by:<br><strong>Кристина Попкова</strong></div>
</div>

<script src="script.js"></script>
</body>
</html>
